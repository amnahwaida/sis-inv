services:
  db:
    image: postgres:15-alpine
    container_name: sisinv_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-sekolah_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sekolah_secret_2024}
      POSTGRES_DB: ${DB_NAME:-inventaris_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sekolah_admin} -d ${DB_NAME:-inventaris_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sis-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sisinv_backend
    restart: unless-stopped
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-sekolah_admin}
      - DB_PASSWORD=${DB_PASSWORD:-sekolah_secret_2024}
      - DB_NAME=${DB_NAME:-inventaris_db}
      - JWT_SECRET=${JWT_SECRET:-sis-inv-dev-jwt-secret-key-2024}
      - GIN_MODE=release
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - sis-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sisinv_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sis-network
    # We don't strictly need to expose ports 80/8080 to the host if using Cloudflare Tunnel,
    # but it's good for local testing.
    ports:
      - "80:80"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    depends_on:
      - frontend
    networks:
      - sis-network

  # Backup logic
  backup:
    image: docker:cli
    container_name: sisinv_backup
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/scripts
      - ./backups:/backups
    entrypoint: /bin/sh -c "while true; do sleep 86400; sh /scripts/backup.sh; done"
    networks:
      - sis-network

networks:
  sis-network:
    driver: bridge

volumes:
  pgdata:
